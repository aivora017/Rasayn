# PharmaCare Pro CI
# v2.0 Playbook §8.1 — every branch gated on typecheck + vitest + cargo check
# + SQLite migration dry-run. No merge without green.
#
# NOTE: the Git repo root IS the pharmacare-pro workspace root — no subdir.
# Runner pinned to ubuntu-24.04 because Tauri 2.x needs webkit2gtk-4.1 /
# libsoup-3.0 / javascriptcoregtk-4.1 which are not in ubuntu-22.04 stock repos.
name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    name: typescript + vitest
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Each package's "test" is already `vitest run` (one-shot), so no extra
      # `-- --run` needed. Passing it crashes turbo ("unexpected argument").
      - run: npm test

  rust:
    name: cargo check + clippy + test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: install tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      # Tauri's generate_context!() macro exist-checks frontendDist at compile time.
      # tauri.conf.json → frontendDist = "../dist" (apps/desktop/dist). Without a
      # frontend build the macro panics and clippy/check/test all fail with
      # "proc macro panicked: frontendDist ... doesn't exist". Build it.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build -w @pharmacare/desktop
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - run: cargo fmt --check
        working-directory: apps/desktop/src-tauri
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: apps/desktop/src-tauri
      - run: cargo check --all-targets
        working-directory: apps/desktop/src-tauri
      - run: cargo test --all
        working-directory: apps/desktop/src-tauri

  migrations:
    name: sqlite migration dry-run
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: apply all migrations in order + smoke-test FKs
        run: |
          python3 - <<'PY'
          import sqlite3, pathlib, sys
          mig = sorted(pathlib.Path("packages/shared-db/migrations").glob("*.sql"))
          c = sqlite3.connect(":memory:")
       